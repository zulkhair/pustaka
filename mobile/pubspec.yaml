name: pustaka
description: "Pustaka — digitize physical documents: capture, OCR, transform, share."
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.0
  dio: ^5.7.0
  go_router: ^14.6.0
  flutter_secure_storage: ^9.2.0
  intl: ^0.19.0
  flutter_image_compress: ^2.3.0
  image: ^4.3.0
  image_picker: ^1.1.2
  package_info_plus: ^8.1.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
