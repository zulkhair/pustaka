name: pustaka

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pustaka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pustaka}
      POSTGRES_DB: pustaka
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pustaka_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pustaka -d pustaka"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pustaka_pgdata:
    name: pustaka_pgdata
